<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Ryan Calleja — Engineering Leadership Consultant. Something is coming.">
<meta property="og:title" content="Ryan Calleja — Engineering Leadership Consultant">
<meta property="og:description" content="Something is coming. Engineering leadership consulting by Ryan Calleja.">
<meta property="og:type" content="website">
<title>Ryan Calleja — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1814;
    --ink-mid: #4a4740;
    --ink-soft: #8a8680;
    --paper: #f7f4ef;
    --paper-warm: #efe9df;
    --accent: #c45c2a;
    --accent-light: #f0d4c2;
    --green: #2a6b4a;
    --green-light: #d4ede0;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.65;
    font-size: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }

  .wordmark {
    font-family: var(--font-display);
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    color: var(--ink);
    margin-bottom: 3rem;
    opacity: 0.6;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border-radius: 999px;
    margin-bottom: 1.5rem;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(2.4rem, 7vw, 4.5rem);
    line-height: 1.1;
    color: var(--ink);
    max-width: 16ch;
    margin: 0 auto 1.5rem;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  p {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--ink-mid);
    max-width: 42ch;
    margin: 0 auto 2.5rem;
  }

  .contact-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--accent);
    font-weight: 500;
    text-decoration: none;
    font-size: 0.95rem;
    border-bottom: 1px solid var(--accent-light);
    padding-bottom: 0.1rem;
    transition: border-color 0.2s;
  }

  .contact-link:hover {
    border-color: var(--accent);
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
    margin: 2.5rem auto;
    opacity: 0.4;
  }

  .social {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  .social a {
    color: var(--ink-soft);
    text-decoration: none;
    transition: color 0.2s;
  }

  .social a:hover {
    color: var(--ink);
  }

  @media (max-width: 480px) {
    h1 { font-size: 2.2rem; }
  }
</style>
</head>
<body>

  <div class="wordmark">Ryan Calleja</div>

  <span class="badge">Coming Soon</span>

  <h1>Something <em>good</em> is on its way.</h1>

  <p>Engineering leadership consulting for tech teams that want to move faster, ship better, and scale without chaos.</p>

  <a href="mailto:callejaryan@gmail.com" class="contact-link">
    Get in touch early →
  </a>

  <div class="divider"></div>

  <div class="social">
    <a href="https://mt.linkedin.com/in/ryncalleja" target="_blank" rel="noopener">LinkedIn</a>
    <span>·</span>
    <span>Malta (CET) · Remote-native</span>
  </div>

</body>
</html>
